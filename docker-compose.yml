services:

  # ─────────────────────────────────────────────────────────
  # VPN GATEWAY
  # qBittorrent runs as a sidecar — all its traffic routes through
  # this container's WireGuard/OpenVPN tunnel. Traefik labels and
  # torrent peer ports are declared here, not on qbittorrent.
  # ─────────────────────────────────────────────────────────
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      VPN_SERVICE_PROVIDER: nordvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      # SERVER_COUNTRIES: ${VPN_SERVER_COUNTRIES}
      TZ: ${TZ}
    networks:
      - media_network
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.${DOMAIN}`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.tls.certresolver=letsencrypt"
      - "traefik.http.routers.qbittorrent.middlewares=local-ipallowlist@file"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8081"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # CLOUDFLARE BYPASS PROXY — used by Prowlarr for protected indexers.
  # Internal only — not exposed via Traefik.
  # ─────────────────────────────────────────────────────────
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      TZ: ${TZ}
      LOG_LEVEL: info
    networks:
      - media_network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # TORRENT CLIENT
  # Shares Gluetun's network namespace — all traffic exits via VPN.
  # Web UI is proxied through Traefik via the gluetun service.
  # ─────────────────────────────────────────────────────────
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      WEBUI_PORT: 8081
    volumes:
      - ./config/qbittorrent:/config
      - ./media:/data
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # USENET DOWNLOADER — direct network, no VPN
  # ─────────────────────────────────────────────────────────
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./config/sabnzbd:/config
      - ./media:/data
    networks:
      - media_network
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sabnzbd.rule=Host(`sabnzbd.${DOMAIN}`)"
      - "traefik.http.routers.sabnzbd.entrypoints=websecure"
      - "traefik.http.routers.sabnzbd.tls.certresolver=letsencrypt"
      - "traefik.http.routers.sabnzbd.middlewares=local-ipallowlist@file"
      - "traefik.http.services.sabnzbd.loadbalancer.server.port=8080"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # INDEXER MANAGER
  # ─────────────────────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./config/prowlarr:/config
    networks:
      - media_network
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls.certresolver=letsencrypt"
      - "traefik.http.routers.prowlarr.middlewares=local-ipallowlist@file"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # MOVIE AUTOMATION
  # ─────────────────────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./config/radarr:/config
      - ./media:/data
    networks:
      - media_network
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls.certresolver=letsencrypt"
      - "traefik.http.routers.radarr.middlewares=local-ipallowlist@file"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # TV AUTOMATION
  # ─────────────────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./config/sonarr:/config
      - ./media:/data
    networks:
      - media_network
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls.certresolver=letsencrypt"
      - "traefik.http.routers.sonarr.middlewares=local-ipallowlist@file"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # MUSIC AUTOMATION
  # ─────────────────────────────────────────────────────────
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./config/lidarr:/config
      - ./media:/data
    networks:
      - media_network
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lidarr.rule=Host(`lidarr.${DOMAIN}`)"
      - "traefik.http.routers.lidarr.entrypoints=websecure"
      - "traefik.http.routers.lidarr.tls.certresolver=letsencrypt"
      - "traefik.http.routers.lidarr.middlewares=local-ipallowlist@file"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # BOOKS/EBOOKS AUTOMATION
  # ─────────────────────────────────────────────────────────
  readarr:
    image: lscr.io/linuxserver/readarr:develop-0.4.18.2805-ls157
    container_name: readarr
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./config/readarr:/config
      - ./media:/data
    networks:
      - media_network
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.readarr.rule=Host(`readarr.${DOMAIN}`)"
      - "traefik.http.routers.readarr.entrypoints=websecure"
      - "traefik.http.routers.readarr.tls.certresolver=letsencrypt"
      - "traefik.http.routers.readarr.middlewares=local-ipallowlist@file"
      - "traefik.http.services.readarr.loadbalancer.server.port=8787"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # MEDIA SERVER
  # Note: On Linux, add device passthrough for hardware transcoding:
  # Intel QuickSync: devices: [/dev/dri:/dev/dri]
  # NVIDIA: runtime: nvidia + NVIDIA_VISIBLE_DEVICES=all
  # ─────────────────────────────────────────────────────────
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    environment:
      TZ: ${TZ}
    volumes:
      - ./config/jellyfin:/config
      - ./media/movies:/data/movies:ro
      - ./media/tv:/data/tv:ro
      - ./media/music:/data/music:ro
      - ./media/books:/data/books:ro
    networks:
      - media_network
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # MEDIA REQUEST PORTAL
  # ─────────────────────────────────────────────────────────
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      TZ: ${TZ}
    volumes:
      - ./config/jellyseerr:/app/config
    networks:
      - media_network
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyseerr.rule=Host(`jellyseerr.${DOMAIN}`)"
      - "traefik.http.routers.jellyseerr.entrypoints=websecure"
      - "traefik.http.routers.jellyseerr.tls.certresolver=letsencrypt"
      - "traefik.http.services.jellyseerr.loadbalancer.server.port=5055"
    depends_on:
      - jellyfin
    restart: unless-stopped

# ─────────────────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────────────────
networks:
  media_network:
    driver: bridge

  traefik_proxy:
    external: true
